<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Dark UI Mockup</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #09090b;
            color: #f4f4f5;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-md mx-auto space-y-8">
        <!-- Header -->
        <div class="flex items-center justify-between">
            <h1 class="text-3xl font-black bg-gradient-to-r from-purple-400 to-teal-400 bg-clip-text text-transparent">WanderKey</h1>
            <div class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center">👤</div>
        </div>

        <!-- Bento Card -->
        <div class="p-6 rounded-[2.5rem] glass shadow-2xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500/10 blur-3xl -mr-10 -mt-10"></div>
            
            <div class="relative space-y-4">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-2xl shadow-[0_8px_20px_rgba(99,102,241,0.3)]">
                        🍣
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Kyoto Explorer</h2>
                        <p class="text-zinc-500 text-sm">Jul 10 - Jul 25, 2026</p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-3 gap-2 py-4 border-y border-white/5">
                    <div class="text-center">
                        <div class="text-xs text-zinc-500 uppercase tracking-widest mb-1">Items</div>
                        <div class="text-lg font-bold">24</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-zinc-500 uppercase tracking-widest mb-1">Stops</div>
                        <div class="text-lg font-bold">8</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-zinc-500 uppercase tracking-widest mb-1">Photos</div>
                        <div class="text-lg font-bold">142</div>
                    </div>
                </div>

                <!-- Progress -->
                <div class="space-y-2">
                    <div class="flex justify-between text-xs">
                        <span class="text-zinc-400">Budget used: $1,240</span>
                        <span class="text-teal-400">65%</span>
                    </div>
                    <div class="h-2 w-full bg-zinc-800/50 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-teal-400 w-[65%] rounded-full shadow-[0_0_12px_rgba(45,212,191,0.4)]"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Rounded Buttons -->
        <div class="flex gap-4">
            <button class="flex-1 py-4 rounded-full bg-zinc-100 text-zinc-950 font-bold shadow-[0_8px_20px_rgba(255,255,255,0.15)] active:scale-95 transition-all">
                Add Trip
            </button>
            <button class="w-16 h-16 rounded-[1.8rem] glass flex items-center justify-center text-xl hover:bg-white/5 active:scale-95 transition-all">
                ⚙️
            </button>
        </div>

        <!-- Pill Tab -->
        <div class="p-1 px-1 rounded-full glass flex items-center">
            <button class="flex-1 py-3 rounded-full bg-zinc-800 text-white font-medium text-sm shadow-inner">Itinerary</button>
            <button class="flex-1 py-3 rounded-full text-zinc-500 font-medium text-sm">Expenses</button>
            <button class="flex-1 py-3 rounded-full text-zinc-500 font-medium text-sm">Photos</button>
        </div>
    </div>
</body>
</html>
